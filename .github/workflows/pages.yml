name: Deploy live demo to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install package
        run: pip install --quiet -e .

      - name: Generate the static demo report
        run: |
          mkdir -p site
          python - <<'PY'
          import html, json, sys
          sys.path.insert(0, "src")
          from claude_agent_example.agent import Agent, Session
          from claude_agent_example.cli import SAMPLE_CORPUS

          # Each entry: the user question we feed in, the agent response.
          QUESTIONS = [
              "What's our data residency commitment for Copilot?",
              "Are Conditional Access policies set to enabled?",
              "Remember that the pilot kick-off is on 2026-07-15.",
              "Do you remember the pilot kick-off date?",
              "How are orphaned SharePoint documents handled?",
          ]

          agent = Agent(corpus=SAMPLE_CORPUS)
          session = Session(user_id="pages-demo")

          turns = []
          for q in QUESTIONS:
              out = agent.run_turn(session, q)
              turns.append({"question": q,
                            "answer": out["answer"],
                            "tools": [tc["tool"] for tc in out["tool_calls"]],
                            "citations": out["citations"],
                            "steps": out["steps"]})

          def card(turn):
              j_tools = html.escape(json.dumps(turn["tools"]))
              j_cites = html.escape(json.dumps(turn["citations"]))
              return f"""
                <div class="card">
                  <div class="kicker">User asks</div>
                  <div class="question">{html.escape(turn["question"])}</div>
                  <div class="kicker tool">Tools picked by the agent</div>
                  <div class="tool-name"><code>{j_tools}</code></div>
                  <div class="kicker">Citations</div>
                  <div class="cite-list"><code>{j_cites}</code></div>
                  <div class="kicker">Agent's final answer</div>
                  <pre>{html.escape(turn["answer"])}</pre>
                  <div class="meta">Reached final answer in {turn["steps"]} step(s).</div>
                </div>
              """

          page = f"""<!DOCTYPE html>
          <html lang="en">
          <head>
            <meta charset="utf-8">
            <meta name="viewport" content="width=device-width, initial-scale=1">
            <title>Claude Agent SDK example - live demo</title>
            <style>
              :root {{
                --primary: #be4d00; --accent: #f97316;
                --bg: #fff7ed; --border: #fed7aa;
                --ink: #1a0f08; --muted: #7c5a3f;
              }}
              * {{ box-sizing: border-box; }}
              body {{
                margin: 0; font-family: 'Segoe UI', system-ui, sans-serif;
                background: var(--bg); color: var(--ink); line-height: 1.5;
              }}
              .hero {{
                background: linear-gradient(135deg, var(--primary) 0%, var(--accent) 100%);
                color: white; padding: 50px 24px 60px;
              }}
              .hero-inner {{ max-width: 900px; margin: 0 auto; }}
              .hero .kicker {{ font-size: 13px; letter-spacing: 2px; opacity: .75; text-transform: uppercase; }}
              .hero h1 {{ font-size: 38px; margin: 10px 0 14px; line-height: 1.1; }}
              .hero p {{ font-size: 17px; margin: 0; opacity: .92; max-width: 720px; }}
              .container {{ max-width: 900px; margin: -30px auto 60px; padding: 0 24px; }}
              .card {{
                background: white; border: 1px solid var(--border); border-radius: 12px;
                padding: 24px 28px; margin: 16px 0;
                box-shadow: 0 1px 3px rgba(190, 77, 0, .08);
              }}
              .kicker {{
                font-size: 11px; letter-spacing: 1.5px; text-transform: uppercase;
                color: var(--muted); margin: 14px 0 4px; font-weight: 600;
              }}
              .kicker:first-child {{ margin-top: 0; }}
              .question {{ font-size: 17px; color: var(--ink); margin-bottom: 6px; }}
              .tool-name code, .cite-list code {{
                background: #ffedd5; padding: 4px 10px; border-radius: 6px;
                font-size: 14px; color: var(--primary); font-weight: 600;
              }}
              pre {{
                background: #1a0f08; color: #fed7aa; padding: 18px 20px;
                border-radius: 8px; overflow-x: auto; margin: 6px 0 0;
                font-family: Consolas, Menlo, monospace; font-size: 13px; line-height: 1.55;
                white-space: pre-wrap; word-wrap: break-word;
              }}
              .meta {{ font-size: 12px; color: var(--muted); margin-top: 10px; }}
              .footer {{
                margin-top: 40px; padding-top: 24px; border-top: 1px solid var(--border);
                color: var(--muted); font-size: 13px; text-align: center;
              }}
              .footer code {{ background: #ffedd5; padding: 2px 6px; border-radius: 4px; }}
              a {{ color: var(--accent); }}
            </style>
          </head>
          <body>
            <div class="hero">
              <div class="hero-inner">
                <div class="kicker">Anthropic · Claude Agent SDK</div>
                <h1>Claude Agent SDK example - live demo</h1>
                <p>Each card below shows a question put to the agent, the tools the
                agent picked, the documents it cited, and the final answer it returned.
                Multi-turn memory persists across questions within this session. Default
                backend is the deterministic stub - one env var swaps to the real
                Claude API.</p>
              </div>
            </div>

            <div class="container">
              {''.join(card(t) for t in turns)}

              <div class="footer">
                Regenerated on every push from the stub provider.
                Install: <code>pip install -e .</code> then <code>claude-agent-example</code>.<br>
                Source: <a href="https://github.com/derekgallardo01/claude-agent-sdk-example">github.com/derekgallardo01/claude-agent-sdk-example</a>
              </div>
            </div>
          </body>
          </html>
          """
          with open("site/index.html", "w", encoding="utf-8") as fh:
              fh.write(page)
          print("wrote site/index.html")
          PY

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: site
      - id: deployment
        uses: actions/deploy-pages@v4
